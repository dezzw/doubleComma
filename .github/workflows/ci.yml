name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build release
        if: matrix.os == 'ubuntu-latest'
        run: cargo build --release

      - name: Check unsafe usage
        if: matrix.os == 'ubuntu-latest'
        run: |
          matches="$(grep -RIn --include='*.rs' 'unsafe' src | sort || true)"
          expected="$(cat <<'EOF'
          src/lib.rs:1:#![forbid(unsafe_code)]
          src/main.rs:1:#![forbid(unsafe_code)]
          EOF
          )"
          printf '%s\n' "$matches"
          test "$matches" = "$expected"

  nix:
    name: Nix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Check flake
        run: nix flake check

      - name: Build flake package
        run: nix build
